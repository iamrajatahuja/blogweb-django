{% extends "base.html" %}
{% load static %}

{% block css_files %}
    <link rel="stylesheet" href="{% static 'blogs/app.css' %}">
{% endblock %}

{% block page_title %}
    All Posts
{% endblock %}

{% block body_content %}
    {% include "blogs/includes/header.html" %}
    <ul>
        {% for bl in blogs %}
            <!--<li><a href="/allposts/{{bl}}">{{ bl|capfirst }}</a></li>-->
            <li><a href="{% url 'blog-post' blog=bl %}">{{ bl|capfirst }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
